<!DOCTYPE html>
<html lang="en">
<head>
   
    <title>Display-block 123</title>
 <style>
.first{
 display: block;
margin-bottom: 10px;

}
.second{
    display: block;
}

p{
width: 200px;
vertical-align: middle;
display: inline-block;
margin-bottom: 400px;
}
.yes{
display: inline-block;
vertical-align: middle;
margin-bottom: 400px;
}
.no{
    display: inline-block;
    vertical-align: middle;
    margin-bottom: 400px;
}
.goo{
   height: 200px;
   width: 200px;
   margin-left: 200px;
  display: inline-block;
  margin-left:100px;
}

.place{

display: block;
margin-top: 0px;
}
 </style>



</head>

<body>
   <input type="text" placeholder="Name" class="first">

<input type="text" placeholder="Email" class="second"> 
<p>Thanks for chatting with our customer
    support. Would you like to take our quick survey?
</p>
<button class="yes">Yes</button>

<button class="no">No</button>
<img src="IMAGES/Google.png" alt="image" class="goo">

<input type="text"placeholder="Search Google or type a URL" class="place">

</body>
</html>
