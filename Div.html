<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Containers</title>
    <style>
.first{
width: 50px;
height: 50px;
background-color: red;
margin-top: 50px;

}

.sec{
width: 60px;
height: 60px;
background-color: green;
border-radius: 30px;
display: inline-block;
vertical-align: bottom;
margin-left: 50px;

}
.sat{
width: 300px;
margin-top: 150px;
border-color: gray;
border-style: solid;
border-width: 1px;
height: 85px;
margin-bottom: 50px;
font-weight: bold;
}
p{margin-left: 10px;}
button{margin-left: 10px;
cursor: pointer;

}
.mus{
width: 400px;
height: 100px;
background-color: rgb(32, 30, 30);
color: white;
font-weight: bold;
cursor: pointer;
}
.install{
padding-top: 15px;

}
.add{padding-bottom: 5px;

color: rgb(136, 130, 130);}



    </style>
</head>

<body>
   <div class="first"> </div> 
<div class="sec" > </div>
<div class="sat">
<p>Satisfied with our service?</p>
<button>Yes</button>
<button>No</button>

</div>
<div class="mus">
<p class="install">Install Youtube Music</p>
<p class="add">Add Youtube Music to your deskstop for quick and easy access</p>

</div>





</body>
</html>
