<!DOCTYPE html>

    <title>Grid-images</title>


<style>
.parent-div{
box-shadow: 5px 5px 20px rgb(236, 236, 236);
width: 150px;
height: 265px;
display: inline-block;

}

.first-image{
width: 150px;
height: 150px;

}
.second-image{
width: 30px;
height: 30px;
border-radius: 15px;
object-fit: cover;
margin-top: -20px;
}
.first-p{
color: gray;
font-family: arial;
line-height: 5px;
margin-top: -5px;
font-size: 15px;
}
.Oliver{
font-weight: bold;
margin-top: 0;
margin-bottom: 30px;
}

.first-button{
padding-top: 8px;
padding-bottom: 8px;
background-color: rgb(0, 119, 255);
color: white;
border: none;
border-radius: 5px;
font-family: arial;
margin-top: 10px;
margin-left: 5px;
cursor: pointer;
}

.first-button:hover{
opacity: 0.8;

}

.rat-div{
display: grid;
grid-template-columns: 20px 1fr;
column-gap: 15px;
align-items: center;
margin-top: 0;
}

.big-div{
display: grid;
grid-template-columns: 1fr 1fr 1fr;
row-gap: 20px;
}


</style>


</head>
