<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>TEXT-BOXES</title>
    <style>
.now{
width: 50px;
height: 50px;
border-radius: 50%;
vertical-align: middle;
margin-right: 5px;
}

.sech{
margin-right: 30px;
border-radius: 10px;
padding-left: 10px;
padding-top: 5px;
padding-bottom: 5px;
font-weight: bold;
border-style: solid;
border-color: rgb(238, 237, 237);

}
.url{
border-radius: 20px;
padding-right: 20px;
border: none;
padding-top: 4px;
padding-bottom: 4px;
padding-left: 20px;
padding-right: 50px;
box-shadow: 5px 5px 5px rgb(214, 209, 209);
font-weight: bold;
}

.email{
margin-bottom: 2px;

}

.agree{
    padding-right: 70px;
    padding-left: 70px;
    padding-top: 9px;
    padding-bottom: 9px;
    border: none;
    border-radius: 30px;
    background-color: rgb(72, 72, 214);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition-duration: 2s;
}

.agree:hover
{background-color: rgb(44, 173, 173);
color: blue;}


.what{
vertical-align: middle;
margin-left: 60px;
margin-top: -30px;
font-weight: bold;

}

.tweet{
vertical-align: middle;
margin-left: 300px;
margin-top: -70px;
background-color:rgb(9, 185, 243);
border-radius: 15PX;
color: white;
border: none;
font-weight: bold;
padding-top: 8px;
padding-bottom: 8px;
padding-left: 15px;
padding-right: 15px;    
cursor: pointer;
}

    </style>

</head>

<body>
    <input type="text" placeholder="Search" class="sech">

<input type="text" placeholder="Search Google or type a URL " class="url">

<P>LinkedIn Signup</P>

 <p class="email">Email</p>

<input type="text">

<p>By clicking Agree & join, you agree to the Privacy Policy.</p>

<button class="agree">Agree & Join</button> <br> <br>
<img src="IMAGES/72dac108222702d1ffee10a2c2887aa7.jpg" class="now">

<p class="what" >What's happening?</p>

<button class="tweet">Tweet</button>

</body>
</html>
