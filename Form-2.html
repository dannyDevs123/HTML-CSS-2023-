<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fanky's Form</title>

<style>
    
.pick{
display:block;
padding-left: 100px;
padding-right: 100px;
padding-top: 10px;
padding-bottom: 10px;
margin-bottom: 10px;
border-radius: 8px;
border: none;
border:1px solid gray;
background-color: rgb(202, 202, 202);
outline-color: transparent;
}
.desti{
    display:block;
padding-left: 100px;
padding-right: 100px;
padding-top: 10px;
padding-bottom: 10px;
margin-bottom: 10px;
border-radius: 8px;
border: none;
border:1px solid gray;
background-color: rgb(209, 208, 208);
outline-color: transparent;
}
.now{
margin-top: 20px;
padding-top: 10px;
padding-bottom: 10px;
background-color: black;
color: white;
border: none;
padding-right: 15px;
padding-left: 15px;
font-weight:bold;
cursor: pointer;
}

.later{
    margin-top: 20px;
padding-top: 10px;
padding-bottom: 10px;
background-color:rgb(172, 172, 172);
color:black;
border: none;
padding-right: 15px;
padding-left: 15px;
font-weight:bold;
margin-left: 10px;
cursor: pointer;
}

h2{
font-size: 50px;

}

</style>

</head>


<body>
    <h2>Request a ride now? </h2>
<input type="text" placeholder="Enter pickup location" class="pick">
<input type="text" placeholder="Enter destination" class="desti">
<button class="now">Request now</button>
<button class="later">Shedule for later</button>


</body>
</html>
