<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>Sign up Form</title>
<style>
.first{
 
 padding-top: 10px;  
 padding-bottom: 10px;
 color: gray;
 text-align: center;
 margin-bottom: 20px;
 border: none;
 border-radius: 10px;
 border: 1px solid gray;

}

.second{
    padding-top: 10px;  
 padding-bottom: 10px;
 color: gray;
 text-align: center;
 margin-bottom: 20px;
 border: none;
 border-radius: 10px;
 border: 1px solid gray;
margin-left: 2px;
}
.third{
padding-right: 180px;
padding-top: 10px;
padding-bottom: 10px;
border-radius: 10px;
border: none;
border: 1px solid gray;
}
button{
display: block;
margin-top: 10px;
padding-right: 150px;
padding-left: 150px;
padding-top: 10px;
padding-bottom: 10px;
border-radius: 10px;
border: none;
background-color:rgb(74, 74, 223);
color: white;
cursor: pointer;
box-shadow: 2px 2px 2px rgb(104, 217, 255);
transition-duration: 1s;
}
button:hover{
background-color: aqua;
color: black;
}


</style>


</head>




<body>
    <input type="text" placeholder="First name" class="first">
<input type="text" placeholder="First name" class="second">
<input type="text" placeholder="Email" class="third">
<button>Sign up</button>
</body>
</html>
